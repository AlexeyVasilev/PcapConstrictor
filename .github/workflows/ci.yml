name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            configure_command: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
            build_command: cmake --build build
            test_command: ctest --test-dir build --output-on-failure
          - os: windows-latest
            configure_command: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
            build_command: cmake --build build --config Release
            test_command: ctest --test-dir build --output-on-failure -C Release

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ninja
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: ${{ matrix.configure_command }}

      - name: Build
        run: ${{ matrix.build_command }}

      - name: Test
        run: ${{ matrix.test_command }}
